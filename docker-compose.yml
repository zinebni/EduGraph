version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edugraph-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount backend directory to persist SQLite db and code updates
      - ./backend:/app
    environment:
      - PORT=8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edugraph-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
